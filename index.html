<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Assistant — Your Intelligent Journey Planner</title>
    <!-- Inter Font Family for Apple/Linear Tech Aesthetics -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Link Core Premium Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-workspace">
        
        <!-- --- APP SIDEBAR PANEL --- -->
        <aside class="app-sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <div class="brand-title">AI Travel Assistant</div>
                <!-- Mini Mobile Sidebar Close Asset -->
                <button class="icon-btn-toggle" id="sidebar-close-btn" style="display: none;" aria-label="Close sidebar">✕</button>
            </div>
            
            <!-- Quick Command Section -->
            <div class="sidebar-actions" style="margin-bottom: 2rem;">
                <button class="action-btn-primary" id="new-chat-btn" style="width: 100%;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Workspace Session
                </button>
            </div>

            <!-- Features Quick Information Display (Linear/Stripe Style) -->
            <div class="sidebar-features-list" style="display: flex; flex-direction: column; gap: 1rem; margin-top: auto;">
                <div class="mini-feature-row" style="display: flex; gap: 0.75rem; align-items: start; font-size: 0.85rem;">
                    <span style="font-size: 1.1rem;">✈️</span>
                    <div>
                        <strong style="display: block; color: var(--text-main);">Smart Planners</strong>
                        <span style="color: var(--text-muted);">Generate comprehensive timelines dynamically.</span>
                    </div>
                </div>
                <div class="mini-feature-row" style="display: flex; gap: 0.75rem; align-items: start; font-size: 0.85rem;">
                    <span style="font-size: 1.1rem;">🎙️</span>
                    <div>
                        <strong style="display: block; color: var(--text-main);">Voice Control</strong>
                        <span style="color: var(--text-muted);">Hands-free itinerary streaming support.</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- --- MAIN CHAT WINDOW CONTAINER --- -->
        <main class="chat-window-main">
            
            <!-- Top Dashboard Bar -->
            <header class="chat-navbar">
                <div class="nav-brand-group" style="display: flex; align-items: center; gap: 1rem;">
                    <!-- Hamburger Menu for Mobile Drawers -->
                    <button class="icon-btn-toggle" id="sidebar-toggle" aria-label="Toggle Navigation">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div class="navbar-title-context">
                        <h2 style="font-size: 1rem; font-weight: 600;">Global Assistant Node</h2>
                    </div>
                </div>
                
                <div class="nav-actions">
                    <!-- Glassmorphism Theme Switching Control -->
                    <button class="icon-btn-toggle" id="theme-toggle" aria-label="Switch Dark/Light Interface Mode">
                        <!-- Default Moon Graphic Generated via CSS Overrides Injection -->
                    </button>
                </div>
            </header>

            <!-- Dynamic Conversation Feed Stream Window -->
            <div class="chat-messages-scroll" id="chat-messages-container">
                <!-- Chat bubbles will automatically inject here via application script layer -->
            </div>

            <!-- Bottom Console Input Hub & Chips Actions -->
            <footer class="chat-footer-controls">
                
                <!-- Quick Navigation Action Shortcut Chips Container -->
                <div class="suggestion-chips-wrapper">
                    <button class="suggestion-chip">✨ Plan a 5-day trip to Japan</button>
                    <button class="suggestion-chip">🏖️ Best beaches in Bali</button>
                    <button class="suggestion-chip">🎒 Budget trip to Paris</button>
                    <button class="suggestion-chip">🏨 Find Luxury Hotels</button>
                    <button class="suggestion-chip">✈️ Check Flight Matrix</button>
                </div>

                <!-- Input Console Command Node -->
                <div class="input-console-frame">
                    <input type="text" id="chat-input-field" placeholder="Ask AI to plan a trip, draft an itinerary, or find restaurants..." autocomplete="off">
                    
                    <div class="console-action-buttons">
                        <!-- Microphone Vocal Control Asset -->
                        <button class="console-btn" id="chat-voice-btn" title="Speak to your Assistant">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 1v10a3 3 0 0 0 3-3V4a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
                        </button>
                        <!-- Transmission Button -->
                        <button class="console-btn" id="chat-send-btn" title="Transmit Prompt Message">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </footer>

        </main>
    </div>

    <!-- Inject Core Application Control Logics -->
    <script src="script.js"></script>
</body>
</html>
